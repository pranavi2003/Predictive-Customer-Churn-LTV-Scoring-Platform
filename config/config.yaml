# =====================================================================
# Predictive Customer Churn & LTV Scoring Platform — Configuration
# =====================================================================
project: churn-ltv-platform

data:
  n_customers: 200000          # local dev size; production EMR job handles 50M+
  raw_path: data/raw/customers.parquet
  features_path: data/processed/features.parquet
  scored_path: data/processed/scored_customers.parquet
  random_seed: 42

spark:
  app_name: churn-feature-engineering
  master: "local[*]"           # on EMR this is set by yarn
  shuffle_partitions: 8        # 2000+ in production
  driver_memory: 4g

model:
  target: churned
  ltv_target: ltv_actual
  id_col: customer_id
  test_size: 0.2
  n_folds: 5
  auc_threshold: 0.88          # quality gate for auto-deployment
  xgboost:
    n_estimators: 400
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 5
    reg_lambda: 1.0
    tree_method: hist
  lightgbm:
    n_estimators: 500
    num_leaves: 63
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_samples: 30
    reg_lambda: 1.0
  ltv_model:
    n_estimators: 400
    num_leaves: 63
    learning_rate: 0.05

paths:
  model_dir: models
  reports_dir: reports

aws:                            # used by EMR / SageMaker / Airflow in production
  region: us-east-1
  s3_bucket: s3://telecom-churn-platform
  emr_cluster_name: churn-feature-emr
  sagemaker_role_arn: arn:aws:iam::<ACCOUNT_ID>:role/SageMakerExecutionRole
  model_package_group: churn-ensemble

monitoring:
  psi_threshold: 0.2            # trigger retraining alert above this
